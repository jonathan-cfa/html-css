<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags em HTML</title>
    <link rel="shortcut icon" href="icon-html.ico" type="image/x-icon">
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserior os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
    <ul type="square">
        <li><abbr title="Use a tag &lt;p&gt;">Parágrafos</abbr></li>
        <li><abbr title="Use a tag &lt;h1>&lt;/h1> ao &lt;h6>&lt;/h6>">Títulos</abbr></li>
        <li><abbr title="Utilize a tag &lt;img>">Imagens</abbr></li>
        <li><abbr title="Utilize a tag &lt;abbr> e em title coloque a explicação da abreviação, em seguida sua abreviação">Abreviações</abbr></li>
        <li><abbr title="Utilize a tag &lt;code> de preferencia com a tag &lt;pre> antes, para que fique mais organizado">Códigos-fonte</abbr></li>
        <li><abbr title="Utilize a tag &lt;ol> para listas com numeros ou ordensalterando o type da tag com 1,A,a,I,i (1,23,a,b,c,i,ii,iii) também é possivel alterar de onde começa a lista colocando depois do type, start =">Listas numeradas</abbr></li>
        <li><abbr title="Utilize a tag &lt;ul> para listas com demarcadores, podendo mudar a forma no type da tag (disc,circle,square)">Lista com demarcadores</abbr></li>
    </ul>
</body>
</html>
